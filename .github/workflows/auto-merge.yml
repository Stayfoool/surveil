name: Low-risk PR auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  automerge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.setOutput("number", "");
              return;
            }
            core.setOutput("number", String(prs[0].number));

      - name: Check merge eligibility
        id: eligibility
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number("${{ steps.pr.outputs.number }}");

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            if (pr.state !== "open" || pr.draft) {
              core.setOutput("eligible", "false");
              return;
            }

            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            })).data.map((label) => label.name);
            const has = (name) => labels.includes(name);

            if (!has("safe-to-merge") || has("needs-human-review") || has("security-sensitive")) {
              core.setOutput("eligible", "false");
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });
            const filenames = files.map((file) => file.filename);
            const blocked = filenames.some((name) =>
              name.startsWith("scripts/") ||
              name.startsWith("systemd/") ||
              name.startsWith("config/") ||
              name.startsWith(".github/workflows/") ||
              name === ".github/dependabot.yml" ||
              name === ".env.example" ||
              name === "requirements.txt" ||
              name === "AGENTS.md"
            );
            if (blocked) {
              core.setOutput("eligible", "false");
              return;
            }

            core.setOutput("eligible", "true");
            core.setOutput("number", String(pull_number));

      - name: Merge low-risk PR
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.eligibility.outputs.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch

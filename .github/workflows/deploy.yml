name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy code
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_SSH_KEY: ~/.ssh/deploy_key
          REMOTE_DIR: ${{ secrets.DEPLOY_DIR }}
          REMOTE_PROXY_DIR: ${{ secrets.DEPLOY_PROXY_DIR }}
          REMOTE_SERVICE_USER: ${{ secrets.DEPLOY_SERVICE_USER }}
        run: ./scripts/deploy_remote.sh

      - name: Install systemd units
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_SSH_KEY: ~/.ssh/deploy_key
          REMOTE_DIR: ${{ secrets.DEPLOY_DIR }}
          REMOTE_PROXY_DIR: ${{ secrets.DEPLOY_PROXY_DIR }}
          REMOTE_SERVICE_USER: ${{ secrets.DEPLOY_SERVICE_USER }}
        run: ./scripts/install_remote_systemd.sh

      - name: Restart Web workbench
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ]; then
            echo "DEPLOY_HOST or DEPLOY_USER is empty; skip restart."
            exit 0
          fi
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            'systemctl restart surveil-holdings-web.service || true'
